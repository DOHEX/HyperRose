name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} secret is not set"
              missing=1
            fi
          done

          [ "${missing}" -eq 0 ] || exit 1

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/hyperrose-release.keystore"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/hyperrose-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts

          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APK was produced"
            exit 1
          fi

          cp -v "${apks[@]}" release-artifacts/

          if [ -f app/build/outputs/mapping/release/mapping.txt ]; then
            cp -v app/build/outputs/mapping/release/mapping.txt release-artifacts/mapping.txt
          fi

          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: hyperrose-release-${{ github.ref_name }}
          path: release-artifacts/
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            "${GITHUB_REF_NAME}"
            release-artifacts/*
            --verify-tag
            --generate-notes
            --fail-on-no-commits
          )

          if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
